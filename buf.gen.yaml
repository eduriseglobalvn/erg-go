# buf.gen.yaml — Proto code generation for erg.ninja lib/ services.
# Per-service strategy (directory) is configured in buf.yaml.
version: v2

managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: erg.ninja

plugins:
  - remote: buf.build/protocolbuffers/go
    out: lib
    opt:
      - paths=source_relative

  - remote: buf.build/grpc/go
    out: lib
    opt:
      - paths=source_relative
