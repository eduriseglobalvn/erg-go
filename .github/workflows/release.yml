name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      version:
        description: Version tag to release, for example v1.0.0
        required: true
        type: string

env:
  GO_VERSION: "1.25"
  IMAGE_NAME: ghcr.io/${{ github.repository }}/erg-server

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Test and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./... -race -count=1 -timeout=10m

  cross-compile:
    name: Cross-compile binaries
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binaries
        run: |
          mkdir -p bin
          for CMD in server plugin-server db-migrate; do
            NAME="${CMD}"
            if [ "${CMD}" = "server" ]; then NAME="erg-server"; fi
            EXT=""
            if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
            CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
              go build -ldflags="-s -w" \
              -o "bin/${NAME}-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}" \
              "./cmd/${CMD}"
          done

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/
          retention-days: 5

  docker:
    name: Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.version }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "short=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.base
          target: runtime
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.short }}
            ${{ env.IMAGE_NAME }}:latest
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [cross-compile, docker]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: releases/

      - name: Build changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "## ${TAG}" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          git log --oneline -20 | sed 's/^/- /' >> CHANGELOG.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: releases/**/*
