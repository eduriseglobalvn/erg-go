name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

env:
  GO_VERSION: "1.25"
  IMAGE_NAME: ghcr.io/${{ github.repository }}/erg-server

permissions:
  contents: read
  packages: write

jobs:
  build-image:
    name: Build container image
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "image=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push erg-server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.base
          target: runtime
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_NAME }}:main
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-image
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'staging' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure kubectl
        env:
          KUBECONFIG_VALUE: ${{ secrets.KUBECONFIG }}
        run: |
          if [ -z "${KUBECONFIG_VALUE}" ]; then
            echo "KUBECONFIG is not configured; skipping kubectl setup."
            exit 0
          fi
          mkdir -p "${HOME}/.kube"
          printf '%s' "${KUBECONFIG_VALUE}" > "${HOME}/.kube/config"

      - name: Deploy erg-server
        env:
          KUBECONFIG_VALUE: ${{ secrets.KUBECONFIG }}
        run: |
          if [ -z "${KUBECONFIG_VALUE}" ]; then
            echo "KUBECONFIG is not configured; image was built but deploy is skipped."
            exit 0
          fi
          kubectl set image deployment/erg-server \
            erg-server=${{ needs.build-image.outputs.image }}:${{ needs.build-image.outputs.tag }} \
            --namespace=erg
          kubectl rollout status deployment/erg-server --namespace=erg --timeout=5m

      - name: Health check
        env:
          READY_URL: ${{ secrets.ERG_READY_URL }}
        run: |
          if [ -z "${READY_URL}" ]; then
            echo "ERG_READY_URL is not configured; skipping remote readiness check."
            exit 0
          fi
          curl --fail --show-error --silent "${READY_URL}"
