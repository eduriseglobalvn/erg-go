# Shared non-secret configuration for erg-server.
# Secret values must be supplied by environment variables, secret manager,
# or an ignored application.local.yaml file for local-only development.

app:
  name: erg-server
  host: 0.0.0.0
  port: 8080
  env: development
  read_timeout: 15s
  write_timeout: 15s
  idle_timeout: 60s
  shutdown_time: 30s

database:
  host: 127.0.0.1
  port: 5432
  user: postgres
  password: ""
  name: erg
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 30m
  conn_max_idle_time: 5m
  auto_migrate: false
  run_backfills: false
  migration_timeout: 2m

mongodb:
  uri: mongodb://localhost:27017
  database: erg
  auth_source: admin
  max_pool_size: 100
  min_pool_size: 10
  server_selection_timeout: 10s
  connect_timeout: 10s
  read_preference: secondaryPreferred

redis:
  host: localhost
  port: 6379
  username: ""
  password: ""
  tls: false
  db: 0
  dial_timeout: 5s
  read_timeout: 3s
  write_timeout: 3s
  pool_size: 10
  min_idle_conns: 5
  max_retries: 3

queue:
  redis_host: localhost
  redis_port: 6379
  redis_username: ""
  redis_password: ""
  redis_db: 0
  redis_tls: false
  concurrency: 10
  retry_delay: 10s
  max_retry: 3
  queue_name: default
  dlq_queue_name: erg-dlq
  retry_backoff: true
  is_server: true

auth:
  jwt_secret: ""
  jwt_refresh_secret: ""
  jwt_public_key: ""
  google_bridge_secret: ""
  jwt_issuer: erg-server
  jwt_algorithms: [HS256]
  bearer_prefix: Bearer
  skip_paths: [/healthz, /ready, /metrics, /swagger]
  access_token_ttl: 3h
  refresh_token_ttl: 168h
  argon2_memory: 65536
  argon2_iterations: 3
  max_failed_login: 5
  failed_login_window: 15m
  block_duration: 15m
  geo_block_enabled: true
  block_unknown_geo: false
  allowed_continents: [AS]

http:
  host: 0.0.0.0
  port: 8080
  read_timeout: 15s
  write_timeout: 15s
  idle_timeout: 60s
  shutdown_timeout: 30s
  trusted_proxy_cidrs: []
  rate_limit:
    enabled: true
    requests_per_minute: 100
    burst: 20
  cors:
    allowed_origins:
      - http://localhost:3000
      - http://localhost:3003
    allowed_methods: [GET, POST, PUT, DELETE, PATCH, OPTIONS]
    allowed_headers: [Accept, Authorization, Content-Type, X-Tenant-ID, X-Request-ID, X-Trace-ID]
    exposed_headers: [X-Request-ID, X-Trace-ID]
    allow_credentials: true
    max_age: 86400

smtp:
  host: ""
  port: 587
  username: ""
  password: ""
  from: ""
  tls: true

r2:
  endpoint: ""
  access_key_id: ""
  secret_key: ""
  bucket_name: ""
  public_domain: ""
  region: auto

ai:
  gemini_api_key: ""
  gemini_model: gemini-3-flash-preview
  gemini_timeout: 10s
  cache_ttl: 24h
  batch_size: 10

telemetry:
  enabled: false
  service_name: erg-server
  service_version: 0.1.0
  environment: development
  jaeger_endpoint: ""

logging:
  level: debug
  format: console
  time_format: rfc3339

scraper:
  min_delay: 3s
  max_delay: 10s
  timeout: 30s
  max_response_size: 10485760
  respect_robots_txt: true
  max_retries: 3

trending:
  refresh_cron: "*/30 * * * *"
  cache_ttl: 25m
  feed_limit: 100
  topics_limit: 20
  news_limit: 20
  min_hot_score: 75

modules:
  enabled: []

compose:
  enabled: false
  deploy_manifest_path: deploy.yaml

tenant:
  enabled: false
  isolation: field
  default_id: default
  definitions: {}
