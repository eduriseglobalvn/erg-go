# Shared non-secret configuration for erg-server.
# Secret values must be supplied by environment variables, secret manager,
# or an ignored application.local.yaml file for local-only development.

app:
  name: erg-server
  host: 0.0.0.0
  port: 8080
  env: development
  read_timeout: 15s
  write_timeout: 15s
  idle_timeout: 60s
  shutdown_time: 30s

database:
  host: 127.0.0.1
  port: 5432
  user: postgres
  password: ""
  name: erg
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 30m
  conn_max_idle_time: 5m
  auto_migrate: false
  run_backfills: false
  migration_timeout: 2m

mongodb:
  uri: mongodb://localhost:27017
  database: erg
  auth_source: admin
  max_pool_size: 100
  min_pool_size: 10
  server_selection_timeout: 10s
  connect_timeout: 10s
  read_preference: secondaryPreferred

redis:
  host: localhost
  port: 6379
  username: ""
  password: ""
  tls: false
  db: 0
  dial_timeout: 5s
  read_timeout: 3s
  write_timeout: 3s
  pool_size: 10
  min_idle_conns: 5
  max_retries: 3

queue:
  redis_host: localhost
  redis_port: 6379
  redis_username: ""
  redis_password: ""
  redis_db: 0
  redis_tls: false
  concurrency: 10
  retry_delay: 10s
  max_retry: 3
  queue_name: default
  dlq_queue_name: erg-dlq
  retry_backoff: true
  is_server: true

auth:
  jwt_secret: ""
  jwt_refresh_secret: ""
  jwt_public_key: ""
  google_bridge_secret: ""
  google_client_id: ""
  google_client_ids: []
  jwt_issuer: erg-server
  jwt_algorithms: [HS256]
  bearer_prefix: Bearer
  skip_paths: [/healthz, /ready, /metrics, /swagger]
  access_token_ttl: 3h
  refresh_token_ttl: 168h
  argon2_memory: 32768
  argon2_iterations: 2
  max_failed_login: 5
  failed_login_window: 15m
  block_duration: 15m
  geo_block_enabled: true
  block_unknown_geo: false
  allowed_continents: [AS]
  cookie:
    enabled: true
    # Empty domain means host-only cookie. Production can set ".erg.edu.vn"
    # so admin/elearning/API subdomains share one browser session.
    domain: ""
    secure: false
    same_site: lax
    access_token_name: erg_access_token
    refresh_token_name: erg_refresh_token

http:
  host: 0.0.0.0
  port: 8080
  read_timeout: 15s
  write_timeout: 15s
  idle_timeout: 60s
  shutdown_timeout: 30s
  trusted_proxy_cidrs: []
  rate_limit:
    enabled: true
    requests_per_minute: 100
    burst: 20
  cors:
    allowed_origins:
      - http://localhost:3000
      - http://127.0.0.1:3000
      - http://localhost:3001
      - http://127.0.0.1:3001
      - http://erg.edu.local:3000
      - http://admin.erg.edu.local:3000
      - http://erg.edu.local:3001
      - http://admin.erg.edu.local:3001
      - http://hoclieu.erg.edu.local:3001
      - http://lms.erg.edu.local:3001
      - http://elearning.erg.edu.local:3001
      - http://elearning.erg.edu.local:3000
      - http://erg.edu.vn:3001
      - http://admin.erg.edu.vn:3001
      - http://hoclieu.erg.edu.vn:3001
      - http://lms.erg.edu.vn:3001
      - http://elearning.erg.edu.vn:3001
      - https://hoclieu.erg.edu.vn:3001
      - https://lms.erg.edu.vn:3001
      - https://elearning.erg.edu.vn:3001
      - http://localhost:3003
      - https://erg.edu.vn
      - https://admin.erg.edu.vn
      - https://hoclieu.erg.edu.vn
      - https://lms.erg.edu.vn
      - https://elearning.erg.edu.vn
    allowed_methods: [GET, POST, PUT, DELETE, PATCH, OPTIONS]
    allowed_headers: [Accept, Authorization, Content-Type, X-Tenant-ID, X-Request-ID, X-Trace-ID]
    exposed_headers: [X-Request-ID, X-Trace-ID, X-RateLimit-Limit, X-RateLimit-Remaining, X-RateLimit-Reset, X-RateLimit-User-Limit, X-RateLimit-User-Remaining, X-RateLimit-User-Reset, X-RateLimit-IpUser-Limit, X-RateLimit-IpUser-Remaining, X-RateLimit-IpUser-Reset, Retry-After]
    allow_credentials: true
    max_age: 86400

smtp:
  host: ""
  port: 587
  username: ""
  password: ""
  from: ""
  tls: true

r2:
  endpoint: ""
  access_key_id: ""
  secret_key: ""
  bucket_name: ""
  public_domain: ""
  region: auto

ai:
  provider: groq
  api_key_encryption_secret: ""
  gemini_api_key: ""
  gemini_model: gemini-3-flash-preview
  gemini_timeout: 10s
  groq_api_key: ""
  groq_model: openai/gpt-oss-120b
  groq_base_url: https://api.groq.com/openai/v1
  groq_timeout: 30s
  groq_max_completion_tokens: 4096
  groq_temperature: 1
  groq_reasoning_effort: medium
  huggingface_image_api_key: ""
  huggingface_image_provider: fal-ai
  huggingface_image_model: black-forest-labs/FLUX.1-Krea-dev
  huggingface_image_base_url: https://router.huggingface.co
  huggingface_image_timeout: 90s
  huggingface_image_width: 1024
  huggingface_image_height: 576
  huggingface_image_steps: 28
  huggingface_image_guidance: 7
  huggingface_image_negative_prompt: text, watermark, logo, blurry, distorted, low quality, extra fingers
  cache_ttl: 24h
  batch_size: 10

telemetry:
  enabled: false
  service_name: erg-server
  service_version: 0.1.0
  environment: development
  jaeger_endpoint: ""

logging:
  level: debug
  format: console
  time_format: rfc3339

scraper:
  min_delay: 3s
  max_delay: 10s
  timeout: 30s
  max_response_size: 10485760
  respect_robots_txt: true
  max_retries: 3

trending:
  refresh_cron: "*/30 * * * *"
  cache_ttl: 25m
  feed_limit: 100
  topics_limit: 20
  news_limit: 20
  min_hot_score: 75

modules:
  enabled: []

compose:
  enabled: false
  deploy_manifest_path: deploy.yaml

tenant:
  enabled: false
  isolation: field
  default_id: default
  definitions: {}

lifecycle:
  auth_bootstrap_admin_on_startup: false
  profile_backfill_on_startup: false
  operation_seed_on_startup: false
  trending_refresh_on_startup: false
  lms_seed_on_startup: false
