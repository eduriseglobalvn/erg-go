syntax = "proto3";

package erg.ninja.lib.trending.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";

option go_package = "erg.ninja/lib/trending/v1;trendingv1";

// ── Enums ──────────────────────────────────────────────────────────────────────

enum TrendingSource {
  TRENDING_SOURCE_UNSPECIFIED = 0;
  TRENDING_SOURCE_GOOGLE       = 1;
  TRENDING_SOURCE_NEWS_API    = 2;
  TRENDING_SOURCE_REDDIT      = 3;
  TRENDING_SOURCE_TWITTER     = 4;
  TRENDING_SOURCE_INTERNAL    = 5;
}

enum TimeRange {
  TIME_RANGE_UNSPECIFIED = 0;
  TIME_RANGE_HOURLY      = 1;
  TIME_RANGE_DAILY       = 2;
  TIME_RANGE_WEEKLY      = 3;
  TIME_RANGE_MONTHLY     = 4;
}

// ── Topic Messages ─────────────────────────────────────────────────────────────

message TrendingTopic {
  string               id                = 1;
  string               topic              = 2;
  string               slug               = 3;
  double               score              = 4;  // 0–100
  int32                volume             = 5;  // estimated mention count
  TrendingSource       source             = 6;
  repeated string      keywords           = 7;
  repeated string      urls               = 8;
  repeated int32       timeline           = 9;  // relative volume per time bucket
  google.protobuf.Timestamp last_refreshed_at = 10;
  google.protobuf.Timestamp created_at    = 11;
  google.protobuf.Timestamp updated_at    = 12;
}

message GetTopTopicsRequest {
  string       tenant_id  = 1;
  int32        limit      = 2;   // default 10, max 100
  TimeRange    time_range = 3;  // default TIME_RANGE_DAILY
  string       source     = 4;  // optional filter
  string       language   = 5;  // optional filter
}

message GetTopTopicsResponse {
  repeated TrendingTopic topics        = 1;
  google.protobuf.Timestamp generated_at = 2;
  TimeRange              time_range   = 3;
}

message GetTopicRequest {
  string tenant_id = 1;
  string topic     = 2;  // URL-encoded or exact match
  string slug      = 3;  // optional: slug form
}

message GetTopicResponse {
  TrendingTopic topic = 1;
}

message SearchTopicsRequest {
  string tenant_id = 1;
  string query      = 2;
  int32  limit      = 3;
}

message SearchTopicsResponse {
  repeated TrendingTopic topics = 1;
}

// ── News Article Messages ───────────────────────────────────────────────────────

message NewsArticle {
  string                     id               = 1;
  string                     topic             = 2;
  string                     headline          = 3;
  string                     source            = 4;
  string                     url               = 5;
  google.protobuf.Timestamp  published_at      = 6;
  double                     relevance_score   = 7;
  google.protobuf.Timestamp  created_at       = 8;
  google.protobuf.Timestamp  updated_at       = 9;
}

message GetTopicNewsRequest {
  string tenant_id = 1;
  string topic     = 2;
  int32  limit     = 3;   // default 10
  int32  offset    = 4;
}

message GetTopicNewsResponse {
  repeated NewsArticle articles = 1;
}

// ── Snapshot Messages ──────────────────────────────────────────────────────────

message TrendingSnapshot {
  string                     id             = 1;
  repeated TrendingTopic     topics         = 2;
  int32                      topic_count    = 3;
  google.protobuf.Timestamp  generated_at   = 4;
  google.protobuf.Timestamp  created_at    = 5;
}

message GetSnapshotRequest {
  string tenant_id    = 1;
  string snapshot_id   = 2;
}

message GetSnapshotResponse {
  TrendingSnapshot snapshot = 1;
}

message GetLatestSnapshotRequest {
  string tenant_id = 1;
  TimeRange time_range = 2;
}

message GetLatestSnapshotResponse {
  TrendingSnapshot snapshot = 1;
}

// ── Refresh Messages ────────────────────────────────────────────────────────────

message RefreshTrendingRequest {
  string       tenant_id   = 1;
  TrendingSource source     = 2;  // which source to refresh, 0 = all
  bool         force       = 3;   // bypass cache
}

message RefreshTrendingResponse {
  string                       status          = 1;  // "ok","error","partial"
  int32                        topic_count     = 2;
  int32                        news_count      = 3;
  google.protobuf.Timestamp    generated_at   = 4;
  string                       message         = 5;
}

// ── Keyword Trend Messages ──────────────────────────────────────────────────────

message GetKeywordTrendRequest {
  string    tenant_id  = 1;
  string    keyword    = 2;
  TimeRange time_range = 3;
  int32     limit      = 4;
}

message KeywordTrendPoint {
  google.protobuf.Timestamp timestamp = 1;
  int32                     volume    = 2;
  double                    score     = 3;
}

message GetKeywordTrendResponse {
  string                   keyword = 1;
  TimeRange                 time_range = 2;
  repeated KeywordTrendPoint points  = 3;
}

// ── Stats ───────────────────────────────────────────────────────────────────────

message GetTrendingStatsRequest {
  string tenant_id = 1;
}

message TrendingStats {
  int32                        total_topics     = 1;
  int32                        active_sources   = 2;
  google.protobuf.Timestamp    last_refresh_at  = 3;
  int32                        news_articles    = 4;
  int32                        snapshots_stored = 5;
}

message GetTrendingStatsResponse {
  TrendingStats stats = 1;
}

// ── Service ────────────────────────────────────────────────────────────────────

service TrendingService {
  // Get top trending topics
  rpc GetTopTopics(GetTopTopicsRequest) returns (GetTopTopicsResponse);

  // Get a single topic by name or slug
  rpc GetTopic(GetTopicRequest) returns (GetTopicResponse);

  // Search topics by keyword
  rpc SearchTopics(SearchTopicsRequest) returns (SearchTopicsResponse);

  // Get news articles for a specific topic
  rpc GetTopicNews(GetTopicNewsRequest) returns (GetTopicNewsResponse);

  // Point-in-time snapshots
  rpc GetSnapshot(GetSnapshotRequest) returns (GetSnapshotResponse);
  rpc GetLatestSnapshot(GetLatestSnapshotRequest) returns (GetLatestSnapshotResponse);

  // Trigger refresh (typically runs as scheduled job)
  rpc Refresh(RefreshTrendingRequest) returns (RefreshTrendingResponse);

  // Volume timeline for a specific keyword
  rpc GetKeywordTrend(GetKeywordTrendRequest) returns (GetKeywordTrendResponse);

  // Aggregate statistics
  rpc GetStats(GetTrendingStatsRequest) returns (GetTrendingStatsResponse);
}
